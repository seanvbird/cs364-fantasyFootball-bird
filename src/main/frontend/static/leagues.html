<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" href="css/styles.css">
		<script src="js/leagues.js" type="module"></script>
		<title>Leagues</title>
	</head>
	<body class="leaguesBody">
		<main>
			<div class="leaguesHeader">
				<h1>
					Leagues
				</h1>
				<button class="newLeagueButtonClass" id="new-league-button">
					&#x2b New League
				</button>
			</div>
			<table class="table">
				<thead class="leaguesThead">
					<tr class="tableHead">
						<th>League Name</th>
						<th>Season Year</th>
						<th>Draft Date</th>
						<th>Scoring Type</th>
						<th>Actions</th>
					</tr>
				</thead>
				<tbody id="leaguesTableBody"></tbody>
			</table>
		</main>


		<div class="modalContainer" id="modal-container">
			<div class="modal" id="modal">
				<label class="label">Enter a league name</label>
				<input type="text" class="input" id="league-name-input">
				<label class="label">Enter the year</label>
				<input type="number" class="input" id="year-input">
				<label class="label">Pick a draft date</label>
				<input type="date" class="input" id="date-input">
				<label class="label">Pick a scoring type</label>
				<input type="text" class="input" id="scoring-type-input">
				<div class="actionsButtons">
					<button class="submitButton" id="submit-button">
						Submit
					</button>
					<button class="cancelButton" id="cancel-button">
						Cancel
					</button>
				</div>
			</div>
		</div>

	</body>

</html>
